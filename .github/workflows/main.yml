name: Compile PanVK Driver Only

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-panvk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mesa Source
        uses: actions/checkout@v4
        with:
          repository: mesa3d/mesa
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config python3-mako python3-ply \
            libdrm-dev libx11-dev libxext-dev libxdamage-dev \
            libxfixes-dev libxcb-glx0-dev libxcb-shm0-dev \
            libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev \
            libxcb-sync-dev libxshmfence-dev libxrandr-dev \
            libwayland-dev wayland-protocols libwayland-egl-backend-dev \
            libvulkan-dev python3-setuptools flex bison

      - name: Configure Meson (PanVK Focused)
        run: |
          meson setup build \
            --buildtype=release \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers=panfrost \
            -Dopengl=false \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dglx=disabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Ddri3=enabled \
            -Dllvm=disabled \
            -Dlmsensors=disabled \
            -Dshared-glapi=disabled \
            -Dgallium-vdpau=disabled \
            -Dgallium-va=disabled \
            -Dgallium-xa=disabled

      - name: Compile PanVK Binary
        # Explicitly target the Panfrost Vulkan driver library
        run: ninja -C build src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Upload PanVK Binary
        uses: actions/upload-artifact@v4
        with:
          name: panvk-driver
          path: build/src/panfrost/vulkan/libvulkan_panfrost.so

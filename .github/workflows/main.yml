name: Build PanVK from GitLab

on:
  workflow_dispatch:

jobs:
  build-panvk:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config python3-mako python3-ply \
            libdrm-dev libx11-dev libxext-dev libxdamage-dev \
            libxfixes-dev libxcb-glx0-dev libxcb-shm0-dev \
            libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev \
            libxcb-sync-dev libxshmfence-dev libxrandr-dev \
            libwayland-dev wayland-protocols libwayland-egl-backend-dev \
            libvulkan-dev python3-setuptools flex bison

      - name: Clone Mesa from GitLab
        # Shallow clone to save time and space
        run: git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa-src

      - name: Configure Meson (Minimal)
        run: |
          meson setup build mesa-src \
            --buildtype=release \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers=panfrost \
            -Dopengl=false \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dglx=disabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled

      - name: Build PanVK Only
        # Direct target for the Panfrost Vulkan driver
        run: ninja -C build src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvulkan_panfrost
          path: build/src/panfrost/vulkan/libvulkan_panfrost.so

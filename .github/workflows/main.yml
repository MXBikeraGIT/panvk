name: Build PanVK for Galaxy A06 (Mali-G52)

on:
  workflow_dispatch:

jobs:
  build-panvk:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build pkg-config python3-mako python3-ply \
            python3-setuptools python3-pip flex bison \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libdrm-dev-arm64-cross libvulkan-dev-arm64-cross
          
          pip3 install --upgrade meson --break-system-packages

      - name: Clone Mesa from GitLab
        run: git clone --depth 1 https://freedesktop.org mesa-src

      - name: Create ARM64 Cross File
        run: |
          cat <<EOF > cross_file.txt
          [binaries]
          c = 'aarch64-linux-gnu-gcc'
          cpp = 'aarch64-linux-gnu-g++'
          ar = 'aarch64-linux-gnu-ar'
          strip = 'aarch64-linux-gnu-strip'
          pkg-config = 'aarch64-linux-gnu-pkg-config'

          [host_machine]
          system = 'linux'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'
          EOF

      - name: Configure Meson
        run: |
          # The key is -Dgallium-vulkan-clc=disabled and -Dllvm=disabled together
          meson setup build mesa-src \
            --cross-file cross_file.txt \
            --buildtype=release \
            -Dplatforms=wayland \
            -Dgallium-drivers=panfrost \
            -Dvulkan-drivers=panfrost \
            -Dopengl=false \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dglx=disabled \
            -Degl=disabled \
            -Dgbm=disabled \
            -Dllvm=disabled \
            -Dgallium-vulkan-clc=disabled \
            -Dvideo-codecs=none \
            -Dgallium-va=disabled \
            -Dgallium-vdpau=disabled \
            -Dgallium-xa=disabled

      - name: Build PanVK Only
        run: ninja -C build src/panfrost/vulkan/libvulkan_panfrost.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvulkan_panfrost_A06
          path: build/src/panfrost/vulkan/libvulkan_panfrost.so
